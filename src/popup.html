<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Mass Takeout Downloader</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>Mass Takeout Downloader</h1>
    </header>

    <section class="status">
      <div id="detected">Scanning…</div>
      <button id="rescan" type="button">Rescan</button>
    </section>

    <section class="hint">
      Each part opens briefly in a background tab. If Google asks for your
      password, confirm it in the first tab that opens — subsequent parts
      should download without prompting.
    </section>

    <section class="controls">
      <label for="concurrency">
        Concurrency: <span id="concurrency-value">3</span>
      </label>
      <input id="concurrency" type="range" min="1" max="5" value="3" />
      <button id="start" type="button" disabled>Start</button>
    </section>

    <section class="progress">
      <div id="progress-summary">Idle</div>
      <ul id="recent"></ul>
    </section>

    <script src="popup.js"></script>
  </body>
</html>
